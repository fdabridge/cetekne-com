<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" fill="none" aria-label="cetekne.com logo">
  <!-- Anchor icon -->
  <g transform="translate(4, 4)">
    <!-- Anchor ring -->
    <circle cx="20" cy="10" r="5" stroke="#0070F3" stroke-width="2.5" fill="none"/>
    <!-- Anchor vertical bar -->
    <line x1="20" y1="15" x2="20" y2="36" stroke="#0070F3" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Anchor horizontal bar -->
    <line x1="12" y1="20" x2="28" y2="20" stroke="#0070F3" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Anchor flukes -->
    <path d="M12 36 Q8 32 12 28" stroke="#0070F3" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M28 36 Q32 32 28 28" stroke="#0070F3" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <!-- Anchor chain arc -->
    <path d="M12 36 Q20 40 28 36" stroke="#0070F3" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  </g>
  <!-- CE badge -->
  <rect x="46" y="8" width="28" height="16" rx="3" fill="#0070F3"/>
  <text x="60" y="20" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="white" text-anchor="middle">CE</text>
  <!-- Wordmark -->
  <text x="80" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="800" fill="#0A2540" letter-spacing="-0.5">tekne</text>
  <text x="80" y="42" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="500" fill="#6B7C93" letter-spacing="1">.com</text>
</svg>

